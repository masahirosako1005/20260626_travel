<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>旅のつづき 管理画面 (デモ版)</title>
  <style>
:root {
  --primary: #e07b39;
  --primary-dark: #c4612a;
  --primary-light: #f5a96a;
  --secondary: #4a9870;
  --bg: #faf7f2;
  --card-bg: #ffffff;
  --text: #2d2414;
  --text-muted: #7a6a55;
  --border: #e8ddd0;
  --shadow: 0 2px 12px rgba(180,120,60,0.10);
  --radius: 14px;
  --radius-sm: 8px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', 'Yu Gothic UI', Meiryo, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  min-height: 100vh;
}

/* Header */
.app-header {
  background: var(--primary);
  color: white;
  padding: 0 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 56px;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 8px rgba(0,0,0,0.15);
}
.app-header h1 { font-size: 18px; font-weight: 700; letter-spacing: 0.02em; }
.app-header .header-sub { font-size: 11px; opacity: 0.85; }

/* Nav */
.bottom-nav {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: white;
  border-top: 1px solid var(--border);
  display: flex;
  z-index: 100;
  box-shadow: 0 -2px 8px rgba(0,0,0,0.08);
}
.nav-item {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 8px 4px;
  cursor: pointer;
  color: var(--text-muted);
  font-size: 10px;
  border: none;
  background: none;
  transition: color 0.15s;
}
.nav-item.active { color: var(--primary); }
.nav-item .nav-icon { font-size: 22px; margin-bottom: 2px; }

/* Main content */
.main-content {
  padding: 16px 16px 80px;
  max-width: 640px;
  margin: 0 auto;
}

/* Sections */
.section { display: none; }
.section.active { display: block; }

/* Cards */
.card {
  background: var(--card-bg);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 14px;
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
}
.card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
}
.card-title { font-size: 14px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; }

/* User selector */
.user-selector-bar {
  background: white;
  border-bottom: 1px solid var(--border);
  padding: 8px 16px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.user-selector-bar label { font-size: 12px; color: var(--text-muted); white-space: nowrap; }
.user-selector-bar select {
  flex: 1;
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 6px 10px;
  font-size: 14px;
  background: white;
  color: var(--text);
}

/* Attachment score */
.attachment-score-big {
  text-align: center;
  padding: 20px 0 10px;
}
.score-number { font-size: 52px; font-weight: 800; color: var(--primary); line-height: 1; }
.score-label { font-size: 13px; color: var(--text-muted); margin-top: 4px; }
.level-badge {
  display: inline-block;
  background: var(--primary);
  color: white;
  border-radius: 20px;
  padding: 4px 14px;
  font-size: 13px;
  font-weight: 700;
  margin: 8px 0;
}

.progress-bar-wrap { background: #f0e8dc; border-radius: 99px; height: 10px; overflow: hidden; margin: 8px 0; }
.progress-bar { height: 100%; background: var(--primary); border-radius: 99px; transition: width 0.5s; }

.badges-list { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
.badge-chip {
  background: #fff3e6;
  border: 1px solid #f0c080;
  color: var(--primary-dark);
  border-radius: 99px;
  padding: 3px 10px;
  font-size: 12px;
  font-weight: 600;
}

/* Stats grid */
.stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 10px 0; }
.stat-item { text-align: center; }
.stat-value { font-size: 22px; font-weight: 800; color: var(--primary); }
.stat-label { font-size: 11px; color: var(--text-muted); }

/* Spot list */
.spot-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 0;
  border-bottom: 1px solid var(--border);
}
.spot-item:last-child { border-bottom: none; }
.spot-icon {
  width: 44px;
  height: 44px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  flex-shrink: 0;
  background: #fff3e6;
}
.spot-info { flex: 1; min-width: 0; }
.spot-name { font-weight: 700; font-size: 15px; }
.spot-meta { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
.spot-badge { font-size: 11px; background: #e8f5ee; color: var(--secondary); border-radius: 4px; padding: 2px 6px; }

/* Rally card */
.rally-card {
  background: linear-gradient(135deg, #fff8f0 0%, #fff3e6 100%);
  border: 1px solid #f0c080;
  border-radius: var(--radius);
  padding: 14px;
  margin-bottom: 12px;
}
.rally-name { font-weight: 700; font-size: 15px; margin-bottom: 6px; }
.rally-progress { display: flex; gap: 6px; flex-wrap: wrap; margin: 8px 0; }
.stamp-dot {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  border: 2px solid var(--primary);
}
.stamp-dot.acquired { background: var(--primary); color: white; }
.stamp-dot.missing { background: white; color: var(--primary-light); }

/* Route card */
.route-card {
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  margin-bottom: 12px;
}
.route-header {
  background: var(--primary);
  color: white;
  padding: 10px 14px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.route-title { font-weight: 700; font-size: 15px; }
.route-time { font-size: 13px; opacity: 0.9; }
.route-body { padding: 12px 14px; }
.route-spot {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 0;
  font-size: 14px;
}
.route-spot:not(:last-child) { border-bottom: 1px dashed var(--border); }
.route-spot .spot-num {
  width: 22px;
  height: 22px;
  background: var(--primary);
  color: white;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  font-weight: 700;
  flex-shrink: 0;
}
.route-reason { font-size: 11px; color: var(--text-muted); margin-top: 4px; }

/* Buttons */
.btn {
  display: inline-block;
  padding: 10px 20px;
  border-radius: 99px;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  border: none;
  transition: all 0.15s;
}
.btn-primary { background: var(--primary); color: white; }
.btn-primary:hover { background: var(--primary-dark); }
.btn-outline { background: white; color: var(--primary); border: 2px solid var(--primary); }
.btn-outline:hover { background: #fff3e6; }
.btn-sm { padding: 6px 14px; font-size: 13px; }
.btn-block { width: 100%; text-align: center; }

/* Session replay */
.session-card {
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  margin-bottom: 12px;
}
.session-header {
  background: #f5ede0;
  padding: 10px 14px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.session-date { font-weight: 700; font-size: 14px; }
.session-meta { font-size: 12px; color: var(--text-muted); }
.session-body { padding: 10px 14px; }
.session-comment { font-size: 13px; color: var(--text-muted); font-style: italic; margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border); }

/* Home hero */
.home-hero {
  background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
  color: white;
  border-radius: var(--radius);
  padding: 20px;
  margin-bottom: 16px;
  position: relative;
  overflow: hidden;
}
.home-hero::after {
  content: '🗾';
  position: absolute;
  right: 16px;
  bottom: -10px;
  font-size: 72px;
  opacity: 0.15;
}
.home-hero h2 { font-size: 20px; font-weight: 800; margin-bottom: 4px; }
.home-hero p { font-size: 13px; opacity: 0.9; }
.hero-level { display: inline-block; background: rgba(255,255,255,0.25); border-radius: 99px; padding: 3px 12px; font-size: 12px; margin-top: 8px; }

/* Section title */
.section-title {
  font-size: 18px;
  font-weight: 800;
  margin-bottom: 14px;
  padding-bottom: 8px;
  border-bottom: 3px solid var(--primary);
  display: flex;
  align-items: center;
  gap: 8px;
}

/* CTA buttons row */
.cta-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }

/* Loading */
.loading { text-align: center; padding: 40px; color: var(--text-muted); font-size: 15px; }

/* Category icons mapping */
.cat-icon { display: inline-block; }

/* Unvisited tag */
.tag { display: inline-block; border-radius: 4px; padding: 2px 7px; font-size: 11px; font-weight: 600; }
.tag-new { background: #e8f5ee; color: #2d7a50; }
.tag-stamp { background: #fff3e6; color: var(--primary-dark); }
.tag-complete { background: #e6f0ff; color: #2a5bb0; }

/* Spot detail modal */
.modal-overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 200;
  align-items: center;
  justify-content: center;
  padding: 16px;
}
.modal-overlay.open { display: flex; }
.modal {
  background: white;
  border-radius: var(--radius);
  padding: 24px;
  max-width: 480px;
  width: 100%;
  max-height: 90vh;
  overflow-y: auto;
}
.modal-title { font-size: 20px; font-weight: 800; margin-bottom: 6px; }
.modal-close { float: right; background: none; border: none; font-size: 22px; cursor: pointer; color: var(--text-muted); margin-top: -4px; }

/* Empty state */
.empty-state { text-align: center; padding: 40px 20px; color: var(--text-muted); }
.empty-state .empty-icon { font-size: 48px; margin-bottom: 12px; }

/* Responsive */
@media (max-width: 400px) {
  .stats-grid { grid-template-columns: repeat(2, 1fr); }
}

    .admin-layout { display: flex; min-height: 100vh; }
    .admin-sidebar {
      width: 200px;
      background: #2d2414;
      color: white;
      padding: 16px 0;
      flex-shrink: 0;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow-y: auto;
    }
    .sidebar-logo { padding: 8px 16px 16px; font-size: 15px; font-weight: 800; border-bottom: 1px solid rgba(255,255,255,0.1); margin-bottom: 8px; }
    .sidebar-item {
      display: block; padding: 10px 16px; color: rgba(255,255,255,0.7);
      cursor: pointer; font-size: 13px; border: none; background: none;
      width: 100%; text-align: left; transition: all 0.15s;
    }
    .sidebar-item:hover, .sidebar-item.active { background: rgba(255,255,255,0.1); color: white; }
    .sidebar-item.active { border-left: 3px solid var(--primary); }
    .admin-main { flex: 1; padding: 24px; min-width: 0; }
    .admin-section { display: none; }
    .admin-section.active { display: block; }
    .kpi-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 14px; margin-bottom: 20px; }
    .kpi-card { background: white; border-radius: 12px; padding: 16px; box-shadow: var(--shadow); border: 1px solid var(--border); }
    .kpi-value { font-size: 28px; font-weight: 800; color: var(--primary); }
    .kpi-label { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { background: #f5ede0; padding: 10px 12px; text-align: left; font-weight: 700; color: var(--text-muted); font-size: 12px; }
    td { padding: 10px 12px; border-bottom: 1px solid var(--border); }
    tr:hover td { background: #faf5ee; }
    .table-wrap { overflow-x: auto; background: white; border-radius: 12px; box-shadow: var(--shadow); }
    .admin-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .admin-title { font-size: 20px; font-weight: 800; }
    .form-group { margin-bottom: 14px; }
    .form-group label { display: block; font-size: 13px; font-weight: 700; margin-bottom: 5px; color: var(--text-muted); }
    .form-group input, .form-group select, .form-group textarea {
      width: 100%; padding: 9px 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px;
    }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .upload-area {
      border: 2px dashed var(--primary-light); border-radius: 12px; padding: 32px;
      text-align: center; cursor: pointer; background: #fff8f0; transition: all 0.15s;
    }
    .upload-area:hover { background: #fff3e6; border-color: var(--primary); }
    .result-box { background: #f5f5f5; border-radius: 8px; padding: 14px; font-size: 13px; font-family: monospace; white-space: pre-wrap; margin-top: 12px; max-height: 200px; overflow-y: auto; }
    .badge { display: inline-block; border-radius: 4px; padding: 2px 8px; font-size: 11px; font-weight: 700; }
    .badge-type { background: #f0e6ff; color: #6a30b0; }
    .rank-num { font-size: 18px; font-weight: 800; color: var(--primary); text-align: center; }
    .chart-bar { height: 10px; background: var(--primary-light); border-radius: 99px; margin-top: 4px; }
    .chart-bar-inner { height: 100%; background: var(--primary); border-radius: 99px; }
    .top-mobile { display: none; }
    @media(max-width:700px) {
      .admin-sidebar { display: none; }
      .top-mobile { display: flex; gap: 6px; overflow-x: auto; padding: 8px 12px; background: #2d2414; }
      .top-mobile button { color: white; background: rgba(255,255,255,0.15); border: none; border-radius: 6px; padding: 6px 12px; font-size: 12px; white-space: nowrap; cursor: pointer; }
      .admin-main { padding: 12px; }
    }
    .dot-type { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 4px; }

  </style>
</head>
<body style="background:var(--bg);">

<div class="admin-layout">
  <nav class="admin-sidebar">
    <div class="sidebar-logo">🧳 旅のつづき<br><span style="font-size:11px;opacity:0.6;">管理画面 (デモ)</span></div>
    <button class="sidebar-item active" onclick="adminTab('dashboard')">📊 ダッシュボード</button>

  <div style="flex:1;display:flex;flex-direction:column;min-width:0;">

      <button onclick="adminTab('spots')">📍 スポット</button>

    </main>

// ── IN-MEMORY DATABASE ────────────────────────────────────────────────────
const DB = {};

function initDB(data) {
  DB.users   = JSON.parse(JSON.stringify(data.users));
  DB.spots   = JSON.parse(JSON.stringify(data.spots));
  DB.rallies = JSON.parse(JSON.stringify(data.rallies));
  DB.benefits = JSON.parse(JSON.stringify(data.benefits));

  // Flatten rally→spots
  DB.rallySpots = [];
  for (const rally of DB.rallies) {
    for (const sid of (rally.target_spots || [])) {
      DB.rallySpots.push({ rally_id: rally.rally_id, spot_id: sid });
    }
  }

  const spotMap    = Object.fromEntries(DB.spots.map(s => [s.spot_id, s]));
  const rallyMap   = Object.fromEntries(DB.rallies.map(r => [r.rally_id, r]));
  const benefitMap = Object.fromEntries(DB.benefits.map(b => [b.benefit_id, b]));

  DB.visits = (data.visits || []).map(v => {
    const sp = spotMap[v.spot_id] || {};
    return { ...v, spot_name: sp.name, category: sp.category, area: sp.area, avg_minutes: sp.avg_minutes };
  });

  DB.stamps = (data.stamps || []).map(s => {
    const sp = spotMap[s.spot_id] || {};
    const ra = s.rally_id ? rallyMap[s.rally_id] : null;
    return { ...s, spot_name: sp.name, category: sp.category, rally_name: ra?.name };
  });

  DB.benefitUses = (data.benefit_uses || []).map(bu => {
    const bn = benefitMap[bu.benefit_id] || {};
    const sp = spotMap[bu.spot_id] || {};
    return { ...bu, benefit_name: bn.name, category: bn.category, spot_name: sp.name };
  });

  DB.routeUsages = (data.route_usages || []).map(r => ({ ...r, used: r.used ? 1 : 0 }));
}

initDB(DEMO_DATA);

// ── REPOSITORY FUNCTIONS ─────────────────────────────────────────────────
function visitsByUser(uid)       { return DB.visits.filter(v => v.user_id === uid); }
function visitsBySession(uid, sid) {
  return DB.visits.filter(v => v.user_id === uid && v.session_id === sid)
    .sort((a, b) => ((a.route_order||0)-(b.route_order||0)) || a.visited_at.localeCompare(b.visited_at));
}
function stampsByUser(uid)       { return DB.stamps.filter(s => s.user_id === uid); }
function benefitUsesByUser(uid)  { return DB.benefitUses.filter(b => b.user_id === uid); }
function routeUsagesByUser(uid)  { return DB.routeUsages.filter(r => r.user_id === uid); }
function userSessions(uid) {
  const map = {};
  for (const v of visitsByUser(uid)) {
    if (!map[v.session_id] || v.visited_at < map[v.session_id]) map[v.session_id] = v.visited_at;
  }
  return Object.entries(map)
    .map(([session_id, session_start]) => ({ session_id, session_start }))
    .sort((a, b) => a.session_start.localeCompare(b.session_start));
}
function lastSession(uid) { const s = userSessions(uid); return s.length ? s[s.length-1] : null; }
function findUser(uid)    { return DB.users.find(u => u.user_id === uid); }
function findSpot(sid)    { return DB.spots.find(s => s.spot_id === sid); }
function userSessionCounts() {
  const map = {};
  for (const v of DB.visits) {
    if (!map[v.user_id]) map[v.user_id] = new Set();
    map[v.user_id].add(v.session_id);
  }
  return Object.entries(map).map(([user_id, ss]) => ({ user_id, session_count: ss.size }));
}

// ── ATTACHMENT SERVICE ────────────────────────────────────────────────────
const LEVELS = [
  { level:1, min:0,   max:49,  title:'はじめての旅人' },
  { level:2, min:50,  max:99,  title:'まち歩き見習い' },
  { level:3, min:100, max:179, title:'地域探索者' },
  { level:4, min:180, max:299, title:'まちの常連' },
  { level:5, min:300, max:Infinity, title:'地域アンバサダー' },
];
const BADGES_DEF = [
  { id:'history', label:'歴史スポット好き',  category:'歴史・文化',       threshold:2 },
  { id:'nature',  label:'自然満喫派',         category:'自然・景観',         threshold:2 },
  { id:'gourmet', label:'グルメ開拓者',        category:'グルメ',             threshold:2 },
  { id:'coupon',  label:'特典活用上手',        category:null, type:'benefit',  threshold:3 },
  { id:'rally',   label:'ラリーコンプリート',  category:null, type:'rally',    threshold:1 },
  { id:'local',   label:'地元再発見マスター',  category:'地元民おすすめ',   threshold:2 },
];

function calcAttachment(uid) {
  const visits   = visitsByUser(uid);
  const stamps   = stampsByUser(uid);
  const benefits = benefitUsesByUser(uid);
  const sessions = userSessions(uid);

  const visitedSpotIds    = new Set(visits.filter(v => v.event_type==='stay').map(v => v.spot_id));
  const totalStayMinutes  = visits.filter(v => v.event_type==='stay').reduce((s,v) => s+(v.stay_minutes||0), 0);
  const revisitCount      = Math.max(0, sessions.length - 1);
  const acquiredSpotIds   = new Set(stamps.map(s => s.spot_id));

  let completedRallyCount = 0;
  for (const rally of DB.rallies) {
    const targets = DB.rallySpots.filter(rs => rs.rally_id===rally.rally_id).map(rs => rs.spot_id);
    if (targets.length > 0 && targets.every(sid => acquiredSpotIds.has(sid))) completedRallyCount++;
  }

  const score = Math.round(
    visitedSpotIds.size * 8 +
    totalStayMinutes    * 0.2 +
    stamps.length       * 10 +
    benefits.length     * 8 +
    completedRallyCount * 20 +
    revisitCount        * 25
  );

  const levelInfo  = LEVELS.find(l => score >= l.min && score <= l.max) || LEVELS[LEVELS.length-1];
  const nextLevel  = LEVELS.find(l => l.level === levelInfo.level + 1);
  const progress   = nextLevel ? Math.round(((score - levelInfo.min) / (nextLevel.min - levelInfo.min)) * 100) : 100;

  // badges
  const catVisitCounts = {};
  for (const v of visits.filter(v => v.event_type==='stay')) {
    catVisitCounts[v.category] = (catVisitCounts[v.category]||0) + 1;
  }
  const earnedBadges = [];
  for (const b of BADGES_DEF) {
    if (b.type==='benefit' && benefits.length >= b.threshold) earnedBadges.push(b.label);
    else if (b.type==='rally' && completedRallyCount >= b.threshold) earnedBadges.push(b.label);
    else if (b.category && (catVisitCounts[b.category]||0) >= b.threshold) earnedBadges.push(b.label);
  }

  const avgStay  = visitedSpotIds.size > 0 ? totalStayMinutes / visitedSpotIds.size : 0;
  const stampRate = visitedSpotIds.size > 0 ? stamps.length / visitedSpotIds.size : 0;
  let userType = '再発見型';
  if (stampRate > 0.7)            userType = 'コンプリート型';
  else if (avgStay > 50)          userType = 'じっくり滞在型';
  else if (benefits.length >= 3)  userType = 'グルメ・特典型';
  else if (visitedSpotIds.size >= 6) userType = '回遊型';

  return {
    score, level: levelInfo.level, title: levelInfo.title, progress,
    nextLevelScore: nextLevel ? nextLevel.min : null,
    visitedSpotCount: visitedSpotIds.size, totalStayMinutes,
    stampCount: stamps.length, benefitUseCount: benefits.length,
    completedRallyCount, revisitCount, badges: earnedBadges, userType
  };
}

function getUserStats(uid) {
  const visits   = visitsByUser(uid);
  const stamps   = stampsByUser(uid);
  const benefits = benefitUsesByUser(uid);

  const visitedSpots   = new Set(visits.filter(v => v.event_type==='stay').map(v => v.spot_id));
  const passOnlySpots  = new Set(visits.filter(v => v.event_type==='pass').map(v => v.spot_id));
  const acquiredStamps = new Set(stamps.map(s => s.spot_id));

  const catScore = {};
  for (const v of visits) {
    if (!v.category) continue;
    catScore[v.category] = (catScore[v.category]||0) +
      (v.event_type==='stay' ? 5 : 0) + (v.stay_minutes||0)*0.2;
  }
  for (const s of stamps)   catScore[s.category] = (catScore[s.category]||0) + 4;
  for (const b of benefits) catScore[b.category]  = (catScore[b.category]||0) + 8;
  for (const v of visits.filter(v => v.event_type==='pass')) catScore[v.category] = (catScore[v.category]||0) - 2;

  const topCategory = Object.entries(catScore).sort((a,b) => b[1]-a[1])[0]?.[0] || null;

  const stayByCategory = {};
  for (const v of visits.filter(v => v.event_type==='stay')) {
    if (!stayByCategory[v.category]) stayByCategory[v.category] = [];
    stayByCategory[v.category].push(v.stay_minutes||0);
  }
  const longStayCategory = Object.entries(stayByCategory)
    .map(([cat, mins]) => ({ cat, avg: mins.reduce((a,b)=>a+b,0)/mins.length }))
    .sort((a,b) => b.avg-a.avg)[0]?.cat || null;

  const benefitCatCount = {};
  for (const b of benefits) benefitCatCount[b.category] = (benefitCatCount[b.category]||0) + 1;
  const couponCategory = Object.entries(benefitCatCount).sort((a,b) => b[1]-a[1])[0]?.[0] || null;

  const nearCompleteRallySpots = new Set();
  const incompleteRallies = [];
  for (const rally of DB.rallies) {
    const targets  = DB.rallySpots.filter(rs => rs.rally_id===rally.rally_id).map(rs => rs.spot_id);
    const acquired = targets.filter(sid => acquiredStamps.has(sid));
    const remaining = targets.filter(sid => !acquiredStamps.has(sid));
    if (remaining.length > 0) {
      incompleteRallies.push({ ...rally, targets, acquired, remaining, completionRate: acquired.length/targets.length });
      if (remaining.length <= 2) remaining.forEach(sid => nearCompleteRallySpots.add(sid));
    }
  }

  return { visitedSpots, passOnlySpots, acquiredStamps, topCategory, longStayCategory,
           couponCategory, nearCompleteRallySpots, incompleteRallies, catScore };
}

function scoreSpot(spot, stats, benefits) {
  let score = 0; const reasons = [];
  if (!stats.visitedSpots.has(spot.spot_id)) { score += 20; reasons.push('未訪問スポット'); }
  else score -= 10;
  if (stats.nearCompleteRallySpots.has(spot.spot_id) && !stats.acquiredStamps.has(spot.spot_id)) {
    score += 30; reasons.push('スタンプあと少しで完了');
  } else if (!stats.acquiredStamps.has(spot.spot_id) && stats.visitedSpots.has(spot.spot_id)) {
    score += 15; reasons.push('スタンプ未取得');
  }
  if (spot.category === stats.topCategory) { score += 15; reasons.push(`お気に入りカテゴリ: ${spot.category}`); }
  if (spot.category === stats.longStayCategory && spot.category !== stats.topCategory) { score += 10; reasons.push('じっくり滞在したカテゴリ'); }
  if (spot.category === stats.couponCategory) { score += 10; reasons.push('特典を利用したカテゴリ'); }
  if (stats.passOnlySpots.has(spot.spot_id)) { score -= 5; reasons.push('前回は通過のみ'); }
  const hasBenefit = benefits.find(b => b.spot_id === spot.spot_id);
  if (hasBenefit) { score += 5; reasons.push(`特典あり: ${hasBenefit.name}`); }
  return { score, reasons };
}

function buildRoute(spots, stats, benefits, routeType) {
  const scored = spots.map(s => {
    const { score, reasons } = scoreSpot(s, stats, benefits);
    return { ...s, recommend_score: score, reasons };
  }).sort((a, b) => b.recommend_score - a.recommend_score);

  const route = []; let totalMinutes = 0;
  for (const spot of scored) {
    if (route.length >= routeType.maxSpots) break;
    if (totalMinutes + spot.avg_minutes > routeType.maxMinutes) continue;
    route.push(spot); totalMinutes += spot.avg_minutes;
    if (route.length >= routeType.minSpots && totalMinutes >= routeType.maxMinutes * 0.6) break;
  }
  const hasBenefit = route.some(s => benefits.find(b => b.spot_id === s.spot_id));
  if (!hasBenefit && route.length < routeType.maxSpots) {
    const bp = scored.find(s => benefits.find(b => b.spot_id === s.spot_id) && !route.find(r => r.spot_id === s.spot_id));
    if (bp && totalMinutes + bp.avg_minutes <= routeType.maxMinutes * 1.1) {
      route.push(bp); totalMinutes += bp.avg_minutes;
    }
  }
  return { ...routeType, spots: route, estimatedMinutes: totalMinutes };
}

function getRecommendations(uid) {
  const stats = getUserStats(uid);
  const routes = ROUTE_TYPES.map(rt => buildRoute(DB.spots, stats, DB.benefits, rt));
  return { routes, stats };
}

  }));

// ── ANALYTICS SERVICE ─────────────────────────────────────────────────────
function getDashboard() {
  const users     = DB.users;
  const allVisits = DB.visits;
  const allStamps = DB.stamps;
  const allBenefitUses = DB.benefitUses;
  const allRouteUsages = DB.routeUsages;
  const spots  = DB.spots;
  const rallies = DB.rallies;

  const totalUsers = users.length;
  const sessionCounts = userSessionCounts();
  const revisitUsers = sessionCounts.filter(r => r.session_count >= 2).length;
  const revisitRate  = totalUsers > 0 ? (revisitUsers / totalUsers * 100).toFixed(1) : 0;

  let completedRallies = 0, participatedRallies = 0;
  for (const u of users) {
    const userStampSpots = new Set(allStamps.filter(s => s.user_id===u.user_id).map(s => s.spot_id));
    for (const rally of rallies) {
      const targets = DB.rallySpots.filter(rs => rs.rally_id===rally.rally_id).map(rs => rs.spot_id);
      const hasAny  = targets.some(sid => userStampSpots.has(sid));
      if (hasAny) {
        participatedRallies++;
        if (targets.every(sid => userStampSpots.has(sid))) completedRallies++;
      }
    }
  }
  const stampCompletionRate = participatedRallies > 0 ? (completedRallies/participatedRallies*100).toFixed(1) : 0;

  const stayVisits      = allVisits.filter(v => v.event_type==='stay');
  const uniqueSessions  = new Set(allVisits.map(v => v.session_id)).size;
  const avgSpotsPerSession = uniqueSessions > 0 ? (stayVisits.length/uniqueSessions).toFixed(1) : 0;

  const usedRoutes  = allRouteUsages.filter(r => r.used===1).length;
  const routeUsageRate = allRouteUsages.length > 0 ? (usedRoutes/allRouteUsages.length*100).toFixed(1) : 0;
  const estimatedConsumption = allBenefitUses.reduce((s,b) => s+(b.estimated_value_yen||0), 0);

  const spotVisitMap = {}, spotStayMap = {};
  for (const v of allVisits) {
    if (!spotVisitMap[v.spot_id]) spotVisitMap[v.spot_id] = 0;
    if (v.event_type==='stay') {
      spotVisitMap[v.spot_id]++;
      if (!spotStayMap[v.spot_id]) spotStayMap[v.spot_id] = [];
      spotStayMap[v.spot_id].push(v.stay_minutes||0);
    }
  }
  const spotMap = Object.fromEntries(spots.map(s => [s.spot_id, s]));

  const popularSpots = Object.entries(spotVisitMap)
    .sort((a,b) => b[1]-a[1]).slice(0,10)
    .map(([spot_id, count]) => ({ ...spotMap[spot_id], visit_count: count }));

  const avgStayRanking = Object.entries(spotStayMap)
    .map(([spot_id, mins]) => ({ ...spotMap[spot_id], avg_stay: Math.round(mins.reduce((a,b)=>a+b,0)/mins.length) }))
    .sort((a,b) => b.avg_stay-a.avg_stay).slice(0,10);

  const passMap = {};
  for (const v of allVisits.filter(v => v.event_type==='pass')) {
    passMap[v.spot_id] = (passMap[v.spot_id]||0) + 1;
  }
  const passSpots = Object.entries(passMap).sort((a,b)=>b[1]-a[1]).slice(0,5)
    .map(([sid, cnt]) => ({ ...spotMap[sid], pass_count: cnt }));

  const stampMap = {};
  for (const s of allStamps) stampMap[s.spot_id] = (stampMap[s.spot_id]||0) + 1;
  const stampRates = spots.map(s => ({
    ...s,
    acquired_count: stampMap[s.spot_id]||0,
    rate: totalUsers > 0 ? ((stampMap[s.spot_id]||0)/totalUsers*100).toFixed(1) : 0
  })).sort((a,b) => b.acquired_count-a.acquired_count);

  const typeMap = {};
  for (const u of users) {
    const uVisits    = allVisits.filter(v => v.user_id===u.user_id && v.event_type==='stay');
    const uStamps    = allStamps.filter(s => s.user_id===u.user_id);
    const uBenefits  = allBenefitUses.filter(b => b.user_id===u.user_id);
    const uSpots     = new Set(uVisits.map(v => v.spot_id));
    const totalStay  = uVisits.reduce((s,v) => s+(v.stay_minutes||0), 0);
    const avgStay    = uSpots.size > 0 ? totalStay/uSpots.size : 0;
    const stampRate  = uSpots.size > 0 ? uStamps.length/uSpots.size : 0;
    let t;
    if (stampRate > 0.7)          t = 'コンプリート型';
    else if (avgStay > 50)        t = 'じっくり滞在型';
    else if (uBenefits.length>=3) t = 'グルメ・特典型';
    else if (uSpots.size >= 6)    t = '回遊型';
    else t = '再発見型';
    typeMap[t] = (typeMap[t]||0) + 1;
  }

  const transitions = {};
  const sessionVisitsMap = {};
  for (const v of allVisits.filter(v => v.event_type==='stay').sort((a,b) => a.visited_at.localeCompare(b.visited_at))) {
    if (!sessionVisitsMap[v.session_id]) sessionVisitsMap[v.session_id] = [];
    sessionVisitsMap[v.session_id].push(v.spot_id);
  }
  for (const sv of Object.values(sessionVisitsMap)) {
    for (let i = 0; i < sv.length-1; i++) {
      const key = `${sv[i]}→${sv[i+1]}`;
      transitions[key] = (transitions[key]||0) + 1;
    }
  }
  const topTransitions = Object.entries(transitions)
    .sort((a,b) => b[1]-a[1]).slice(0,10)
    .map(([pair, count]) => {
      const [from, to] = pair.split('→');
      return { from: spotMap[from]?.name||from, to: spotMap[to]?.name||to, count };
    });

  return {
    kpi: { totalUsers, revisitRate, stampCompletionRate, avgSpotsPerSession, routeUsageRate, estimatedConsumption },
    popularSpots, avgStayRanking, passSpots, stampRates,
    userTypeDistribution: typeMap, topTransitions
  };
}

function getRevisitCandidates() {
  const users = DB.users;
  const allVisits = DB.visits;
  const allStamps = DB.stamps;
  const allBenefitUses = DB.benefitUses;
  const allRouteUsages = DB.routeUsages;
  const rallies = DB.rallies;
  const now = new Date('2026-06-29T00:00:00');

  const candidates = users.map(user => {
    const uVisits   = allVisits.filter(v => v.user_id===user.user_id);
    const uStamps   = allStamps.filter(s => s.user_id===user.user_id);
    const uBenefits = allBenefitUses.filter(b => b.user_id===user.user_id);
    const uRoutes   = allRouteUsages.filter(r => r.user_id===user.user_id);
    if (uVisits.length === 0) return null;

    const acquiredSpots = new Set(uStamps.map(s => s.spot_id));
    const sessions = new Set(uVisits.map(v => v.session_id));
    const lastVisit = uVisits.sort((a,b) => b.visited_at.localeCompare(a.visited_at))[0];
    const lastVisitDate = new Date(lastVisit.visited_at);
    const daysSince = Math.floor((now - lastVisitDate) / (1000*60*60*24));
    const recencyScore = Math.max(0, 30 - daysSince * 0.1);

    let incompleteRallyCount = 0, remainingStampNearComplete = 0;
    for (const rally of rallies) {
      const targets   = DB.rallySpots.filter(rs => rs.rally_id===rally.rally_id).map(rs => rs.spot_id);
      const remaining = targets.filter(sid => !acquiredSpots.has(sid));
      if (remaining.length > 0) {
        incompleteRallyCount++;
        if (remaining.length <= 2) remainingStampNearComplete += (3 - remaining.length) * 15;
      }
    }

    const benefitInterestScore = uBenefits.length * 5;
    const routeInterestScore   = uRoutes.filter(r => r.used===1).length * 10;
    const uSpots    = new Set(uVisits.filter(v => v.event_type==='stay').map(v => v.spot_id));
    const totalStay = uVisits.filter(v => v.event_type==='stay').reduce((s,v) => s+(v.stay_minutes||0), 0);
    const attachmentScore = Math.round(uSpots.size*8 + totalStay*0.2 + uStamps.length*10 + uBenefits.length*8);

    const revisitScore = Math.round(
      incompleteRallyCount * 25 +
      remainingStampNearComplete +
      recencyScore +
      benefitInterestScore +
      routeInterestScore +
      attachmentScore * 0.1
    );

    const avgStay   = uSpots.size > 0 ? totalStay/uSpots.size : 0;
    const stampRate = uSpots.size > 0 ? uStamps.length/uSpots.size : 0;
    let userType;
    if (stampRate > 0.7)          userType = 'コンプリート型';
    else if (avgStay > 50)        userType = 'じっくり滞在型';
    else if (uBenefits.length>=3) userType = 'グルメ・特典型';
    else if (uSpots.size >= 6)    userType = '回遊型';
    else userType = '再発見型';

    const LV = [{level:1,min:0},{level:2,min:50},{level:3,min:100},{level:4,min:180},{level:5,min:300}];
    const attachLevel = [...LV].reverse().find(l => attachmentScore >= l.min)?.level || 1;

    let reason = '';
    if (incompleteRallyCount > 0 && remainingStampNearComplete > 0) reason = `ラリーコンプリートまであと少し！(${incompleteRallyCount}件)`;
    else if (incompleteRallyCount > 0) reason = `未完了ラリーが${incompleteRallyCount}件あります`;
    else if (userType === 'グルメ・特典型') reason = '新しい特典をお試しください';
    else reason = '新しいスポットをご案内できます';

    return {
      user_id: user.user_id, nickname: user.nickname, userType,
      lastVisitDate: lastVisit.visited_at.slice(0,10), daysSince,
      incompleteRallyCount, attachmentLevel: attachLevel,
      revisitScore, reason, sessionCount: sessions.size
    };
  }).filter(Boolean).sort((a,b) => b.revisitScore - a.revisitScore);

  return candidates;
}

function acquireStampDemo(uid, spotId, rallyId) {
  const now = new Date().toISOString();
  const sessionId = `SESS-${uid}-WEB`;
  // check duplicate
  const existing = DB.stamps.find(s => s.user_id===uid && s.spot_id===spotId && s.rally_id===(rallyId||null));
  if (existing) return { error: 'このスタンプはすでに取得済みです', status: 409 };
  const sp = findSpot(spotId);
  const rally = rallyId ? DB.rallies.find(r => r.rally_id===rallyId) : null;
  const stampId = `ST-${uid}-${spotId}-${Date.now()}`;
  DB.stamps.push({
    stamp_id: stampId, user_id: uid, session_id: sessionId, spot_id: spotId,
    rally_id: rallyId||null, acquired_at: now, method: 'demo_button',
    spot_name: sp?.name, category: sp?.category, rally_name: rally?.name
  });
  const existingVisit = DB.visits.find(v => v.user_id===uid && v.spot_id===spotId && v.event_type==='stay');
  if (!existingVisit) {
    const visitId = `V-${uid}-${spotId}-${Date.now()}`;
    DB.visits.push({
      visit_id: visitId, user_id: uid, session_id: sessionId, spot_id: spotId,
      visited_at: now, route_order: null, stay_minutes: sp?.avg_minutes||30,
      pass_minutes: 0, event_type: 'stay',
      spot_name: sp?.name, category: sp?.category, area: sp?.area, avg_minutes: sp?.avg_minutes
    });
    // Update session in seeded sessions if needed
    const existingSess = userSessions(uid).find(s => s.session_id === sessionId);
    // sessions are derived from visits, so it auto-appears
  }
  return { success: true, stamp_id: stampId };
}

    <div class="kpi-card"><div class="kpi-value">${DB.spots.length}</div><div class="kpi-label">スポット</div></div>
    <div class="kpi-card"><div class="kpi-value">${DB.rallies.length}</div><div class="kpi-label">ラリー</div></div>
    <div class="kpi-card"><div class="kpi-value">${DB.benefits.length}</div><div class="kpi-label">特典</div></div>
    <div class="kpi-card"><div class="kpi-value">${DB.visits.length}</div><div class="kpi-label">訪問記録</div></div>
    <div class="kpi-card"><div class="kpi-value">${DB.stamps.length}</div><div class="kpi-label">スタンプ</div></div>
    <div class="kpi-card"><div class="kpi-value">${DB.benefitUses.length}</div><div class="kpi-label">特典利用</div></div>
    <div class="kpi-card"><div class="kpi-value">${DB.routeUsages.length}</div><div class="kpi-label">ルート利用</div></div>
  </div>`;
}

// SPOTS
function loadSpots() {
  const tbody = document.getElementById('spotsBody');
  tbody.innerHTML = DB.spots.map(s => `<tr>
    <td style="font-weight:700;color:var(--text-muted);">${s.spot_id}</td>
    <td>${CAT_ICON[s.category]||'📍'} ${s.name}</td>
    <td>${s.category}</td>
    <td>${s.area}</td>
    <td>${s.avg_minutes}</td>
    <td>
      <button class="btn btn-outline btn-sm" onclick="editSpot('${s.spot_id}')">編集</button>
      <button class="btn btn-sm" style="background:#fee;color:#c00;border:1px solid #fcc;margin-left:4px;" onclick="deleteSpot('${s.spot_id}','${s.name}')">削除</button>
    </td>
  </tr>`).join('');
}

function showSpotForm() {
  editingSpotId = null;
  document.getElementById('spotFormTitle').textContent = 'スポット追加';
  ['spot_id','name','area','description'].forEach(f => document.getElementById('f_'+f).value = '');
  document.getElementById('f_avg_minutes').value = 30;
  document.getElementById('f_spot_id').disabled = false;
  document.getElementById('spotFormArea').style.display = 'block';
}

function editSpot(id) {
  const s = findSpot(id);
  if (!s) return;
  editingSpotId = id;
  document.getElementById('spotFormTitle').textContent = 'スポット編集';
  document.getElementById('f_spot_id').value = s.spot_id;
  document.getElementById('f_spot_id').disabled = true;
  document.getElementById('f_name').value = s.name;
  document.getElementById('f_category').value = s.category;
  document.getElementById('f_area').value = s.area;
  document.getElementById('f_avg_minutes').value = s.avg_minutes;
  document.getElementById('f_description').value = s.description || '';
  document.getElementById('spotFormArea').style.display = 'block';
  document.getElementById('spotFormArea').scrollIntoView({ behavior: 'smooth' });
}

function saveSpot() {
  const spot = {
    spot_id: document.getElementById('f_spot_id').value.trim(),
    name: document.getElementById('f_name').value.trim(),
    category: document.getElementById('f_category').value,
    area: document.getElementById('f_area').value.trim(),
    avg_minutes: parseInt(document.getElementById('f_avg_minutes').value) || 30,
    description: document.getElementById('f_description').value.trim() || null
  };
  if (!spot.spot_id || !spot.name || !spot.area) { alert('必須項目を入力してください'); return; }
  if (editingSpotId) {
    const idx = DB.spots.findIndex(s => s.spot_id === editingSpotId);
    if (idx >= 0) DB.spots[idx] = spot;
  } else {
    if (DB.spots.find(s => s.spot_id === spot.spot_id)) { alert('このIDはすでに使用されています'); return; }
    DB.spots.push(spot);
  }
  document.getElementById('spotFormArea').style.display = 'none';
  loadSpots();
}

function deleteSpot(spotId, name) {
  if (!confirm(`「${name}」を削除しますか？`)) return;
  DB.spots = DB.spots.filter(s => s.spot_id !== spotId);
  loadSpots();
}

// RALLIES
function loadRallies() {
  const el = document.getElementById('ralliesContent');
  const spotMap = Object.fromEntries(DB.spots.map(s => [s.spot_id, s]));
  let html = '<div style="display:grid;gap:14px;">';
  DB.rallies.forEach(r => {
    html += `<div class="card">
      <div style="font-weight:700;font-size:16px;margin-bottom:6px;">${r.name}</div>
      <div style="font-size:12px;color:var(--text-muted);margin-bottom:10px;">ID: ${r.rally_id}${r.season_tag?' ・ '+r.season_tag:''}</div>
      <div style="display:flex;flex-wrap:wrap;gap:8px;">
        ${(r.target_spots||[]).map(sid => {
          const sp = spotMap[sid] || {};
          return `<div style="display:flex;align-items:center;gap:4px;background:#fff3e6;border:1px solid #f0c080;border-radius:8px;padding:6px 10px;font-size:13px;">
            <span>${CAT_ICON[sp.category]||'📍'}</span><span>${sp.name||sid}</span>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  });
  html += '</div>';
  el.innerHTML = html;
}

// BENEFITS
function loadBenefits() {
  const spotMap = Object.fromEntries(DB.spots.map(s => [s.spot_id, s]));
  document.getElementById('benefitsBody').innerHTML = DB.benefits.map(b => `<tr>
    <td style="font-weight:700;color:var(--text-muted);">${b.benefit_id}</td>
    <td>🎁 ${b.name}</td>
    <td>${b.category}</td>
    <td>${b.spot_id?(CAT_ICON[spotMap[b.spot_id]?.category]||'📍')+' '+(spotMap[b.spot_id]?.name||b.spot_id):'—'}</td>
    <td style="font-weight:700;color:var(--primary);">¥${b.estimated_value_yen}</td>
  </tr>`).join('');
}

// REVISIT
function loadRevisit() {
  const el = document.getElementById('revisitContent');
  el.innerHTML = '<div class="loading">計算中...</div>';
  setTimeout(() => {
    try {
      const candidates = getRevisitCandidates();
      if (candidates.length === 0) {
        el.innerHTML = '<div class="empty-state"><div class="empty-icon">🎉</div><div>再訪候補ユーザーがいません</div></div>';
        return;
      }
      let html = `<div style="font-size:13px;color:var(--text-muted);margin-bottom:12px;">${candidates.length}人の再訪候補ユーザー (再訪スコア順)</div>`;
      html += `<div class="table-wrap"><table>
        <thead><tr>
          <th>#</th><th>ユーザー</th><th>タイプ</th><th>最終訪問</th><th>未完了ラリー</th><th>愛着Lv</th><th>再訪スコア</th><th>おすすめ理由</th>
        </tr></thead><tbody>
        ${candidates.map((c,i) => `<tr>
          <td class="rank-num">${i+1}</td>
          <td><div style="font-weight:700;">${c.nickname}</div><div style="font-size:11px;color:var(--text-muted);">${c.user_id}</div></td>
          <td><span class="badge badge-type" style="background:${TYPE_COLORS[c.userType]||'#888'}22;color:${TYPE_COLORS[c.userType]||'#888'};">${c.userType}</span></td>
          <td><div>${c.lastVisitDate}</div><div style="font-size:11px;color:var(--text-muted);">${c.daysSince}日前</div></td>
          <td style="text-align:center;font-weight:700;color:${c.incompleteRallyCount>0?'var(--primary)':'var(--text-muted)'};">${c.incompleteRallyCount}件</td>
          <td style="text-align:center;"><span style="font-weight:700;">Lv.${c.attachmentLevel}</span></td>
          <td style="text-align:center;font-weight:800;font-size:18px;color:var(--primary);">${c.revisitScore}</td>
          <td style="font-size:12px;color:var(--text-muted);">${c.reason}</td>
        </tr>`).join('')}
        </tbody></table></div>`;
      el.innerHTML = html;
    } catch(e) {
      el.innerHTML = `<div class="card" style="color:red">エラー: ${e.message}</div>`;
    }
  }, 50);
}

// Init
loadDashboard();
</script>
</body>
</html>
